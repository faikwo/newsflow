version: "3.9"

services:
  backend:
    build: ./backend
    container_name: newsflow-backend
    restart: unless-stopped
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/newsflow.db
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    networks:
      - newsflow-net

  frontend:
    build: ./frontend
    container_name: newsflow-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - newsflow-net

networks:
  newsflow-net:
    driver: bridge
